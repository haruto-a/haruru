<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパーギャラクシーアドベンチャー</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-board">スコア: <span id="score">000000</span></div>
            <div id="start-screen" class="screen">
                <h1>スーパーギャラクシーアドベンチャー</h1>
                <p>スペースキーでスタート</p>
                <p class="controls">矢印キーで移動 • スペースキーでジャンプ</p>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>ゲームオーバー</h1>
                <p>スペースキーでリスタート</p>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>

</html>
