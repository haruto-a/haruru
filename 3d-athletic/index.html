<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Athletic Game | Vanilla</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="ui-layer">
    <div id="status-bar">
      <div id="stage-info">Stage: 1 / 50</div>
      <div id="timer" class="timer">Time: 0.00s</div>
    </div>

    <div id="ready-overlay" class="overlay title-screen">
      <div class="title-content">
        <h2 style="font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ffff; color: #ffffff;">3D Athletic</h2>
        <p>WASD / 矢印キー: 移動</p>
        <p>Space: ジャンプ / 2段ジャンプ</p>
        <p>Shift: スライディング</p>
        <p>左クリック: ムチ（攻撃）</p>
        <p>マウス: カメラ回転</p>
        <p style="margin-top: 25px; font-size: 1.2rem; font-weight: bold; color: #00ffff; text-shadow: 0 0 8px #00ffff;">画面をクリックしてスタート！</p>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <h1>GAME OVER</h1>
      <button id="retry-btn" class="restart-btn">もう一度挑戦</button>
    </div>

    <div id="clear-overlay" class="overlay hidden">
      <h1 id="clear-title">GOAL!</h1>
      <p id="clear-time-text">Clear Time: 0.00s</p>
      <button id="next-stage-btn" class="restart-btn" style="margin-bottom: 10px;">次のステージへ</button>
      <button id="reset-btn" class="restart-btn" style="background-color: #95a5a6;">最初から遊ぶ</button>
    </div>
  </div>

  <!-- Libraries via CDN -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>

  <script type="module" src="script.js"></script>
</body>

</html>
